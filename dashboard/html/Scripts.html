          </tbody>
        </table>
      </div>
    </div>
  `;
}

// ── Testing tab (HiSET / GED) ─────────────────────────────────
const TESTING_SUBTESTS = {
  HiSET: ['Language Arts – Reading', 'Language Arts – Writing', 'Mathematics', 'Science', 'Social Studies'],
  GED:   ['Reasoning Through Language Arts', 'Mathematical Reasoning', 'Science', 'Social Studies'],
};
let _testingData = null;
let _testingStudentId = null;

function _loadTestingTab() {
  const p = currentModalProfile;
  const studentId = p ? (p.academicId || p.id) : null;
  const container = document.getElementById('testingTabContent');
  if (!studentId || !container) return;

  container.innerHTML = '<div style="padding:16px;text-align:center;color:var(--text-muted);">Loading…</div>';

  google.script.run
    .withSuccessHandler(function(result) {
      if (!result || result.success === false) {
        container.innerHTML = '<div style="padding:16px;text-align:center;color:var(--high);">' +
          esc((result && result.error) || 'Failed to load.') + '</div>';
        return;
      }
      _testingData = result;
      _testingStudentId = studentId;
      _renderTestingTab();
    })
    .withFailureHandler(function(err) {
      container.innerHTML = '<div style="padding:16px;text-align:center;color:var(--high);">' +
        esc(err && err.message ? err.message : 'Failed to load.') + '</div>';
    })
    .getStudentTestingData(studentId); // SERVER function — lives in TestingAttempts.gs
}

function _renderTestingTab() {
  const container = document.getElementById('testingTabContent');
  const data = _testingData;
  if (!container || !data) return;

  const program = data.examProgram;
  const subtestNames = TESTING_SUBTESTS[program] || [];
  const subtestMap = {};
  (data.subtests || []).forEach(s => { subtestMap[s.name] = s; });

  container.innerHTML = subtestNames.map(name => {
    const s = subtestMap[name] || { name, status: 'Not Taken', attempts: [] };
    const statusColor = s.status === 'Pass' ? 'var(--low)' : s.status === 'Fail' ? 'var(--high)' : 'var(--text-muted)';
    const uid = 'testing-' + name.replace(/\W/g, '');

    return `<div class="info-section">
      <h3 onclick="toggleSection('${uid}', this)" style="cursor:pointer;display:flex;align-items:center;gap:8px;">
        ${esc(name)}
        <span class="type-tag" style="background:${statusColor};color:#fff;margin:0;">${esc(s.status)}</span>
        <span style="margin-left:auto;font-size:11px;color:var(--text-muted);">${s.attempts.length} attempt${s.attempts.length !== 1 ? 's' : ''} ▾</span>
      </h3>
      <div id="${uid}">
        <table class="tr-table" style="width:100%;margin-bottom:10px;">
          <thead><tr><th>Date</th><th>Score</th><th>Result</th></tr></thead>
          <tbody>
            ${s.attempts.length ? s.attempts.map(a => `
              <tr>
                <td>${esc(a.date || '—')}</td>
                <td>${a.score ?? '—'}</td>
                <td style="color:${a.result === 'Pass' ? 'var(--low)' : 'var(--high)'};font-weight:600;">${esc(a.result || '—')}</td>
              </tr>`).join('') : `<tr><td colspan="3" style="text-align:center;color:var(--text-muted);font-style:italic;">No attempts logged yet.</td></tr>`}
          </tbody>
        </table>
        ${_canEditTesting() ? `
        <div style="display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap;">
          <div><label style="font-size:11px;color:var(--text-muted);display:block;">Date</label>
            <input type="date" id="${uid}-date" style="background:var(--bg);border:1px solid var(--border);border-radius:5px;color:var(--text);padding:6px 8px;font-size:12.5px;"></div>
          <div><label style="font-size:11px;color:var(--text-muted);display:block;">Score</label>
            <input type="number" id="${uid}-score" style="width:70px;background:var(--bg);border:1px solid var(--border);border-radius:5px;color:var(--text);padding:6px 8px;font-size:12.5px;"></div>
          <div><label style="font-size:11px;color:var(--text-muted);display:block;">Result</label>
            <select id="${uid}-result" style="background:var(--bg);border:1px solid var(--border);border-radius:5px;color:var(--text);padding:6px 8px;font-size:12.5px;">
              <option value="Pass">Pass</option>
              <option value="Fail">Fail</option>
            </select></div>
          <button class="btn-override" onclick="_saveTestingAttempt('${esc(name)}', '${uid}')">Log Attempt</button>
        </div>` : ''}
      </div>
    </div>`;
  }).join('');
}

function _canEditTesting() {
  return _can('edit_transcript'); // reuses the same permission as transcript edits — adjust if you want a separate permission
}

function _saveTestingAttempt(subtestName, uid) {
  const date   = document.getElementById(uid + '-date').value;
  const score  = document.getElementById(uid + '-score').value;
  const result = document.getElementById(uid + '-result').value;
  if (!date || !result) { showToast('Pick a date and result first.', 'error'); return; }

  google.script.run
    .withSuccessHandler(function(res) {
      if (!res || res.success === false) { showToast((res && res.error) || 'Save failed.', 'error'); return; }
      showToast('Attempt logged.');
      _testingData = null;
      _loadTestingTab();
    })
    .withFailureHandler(function(err) {
      showToast((err && err.message) || 'Save failed — please try again.', 'error');
    })
    .saveTestingAttempt(_testingStudentId, _testingData.examProgram, subtestName, date, score ? parseFloat(score) : null, result, _currentEmployeeId, _currentRole); // SERVER function — lives in TestingAttempts.gs
}

// ── Academic transcript tab ────────────────────────────────────
const TRANSCRIPT_COURSE_CATEGORIES = ['English','Math','Science','Social Studies','Language','Fine Arts','Electives'];

let _courseCatalogue = null; // cached across the session — course list rarely changes

function _getCourseIdCategoryMap() {
  const map = {};
  (_courseCatalogue || []).forEach(c => {
    if (c.classId) map[c.classId] = c.category;
  });
  return map;
}

function _loadTranscriptTab() {
  const studentId = currentModalProfile ? currentModalProfile.academicId : null;
  if (!studentId) {
    document.getElementById('transcriptLoading').style.display = 'none';
    document.getElementById('transcriptContent').classList.remove('hidden');
    document.getElementById('transcriptContent').innerHTML =
      '<div style="padding:24px;text-align:center;color:var(--text-muted);font-style:italic;">No academic ID on file for this student — transcript cannot be loaded.</div>';
    return;
  }

  if (_transcriptData && _transcriptStudentId === studentId) {
    _renderTranscriptTab();
    return;
  }

  document.getElementById('transcriptLoading').style.display = 'block';
  document.getElementById('transcriptContent').classList.add('hidden');

  google.script.run
    .withSuccessHandler(function(result) {
      document.getElementById('transcriptLoading').style.display = 'none';
      document.getElementById('transcriptContent').classList.remove('hidden');

      if (!result || result.success === false) {
        document.getElementById('transcriptContent').innerHTML =
          '<div style="padding:24px;text-align:center;color:var(--high);">' +
          esc(result && result.error ? result.error : 'Failed to load transcript.') + '</div>';
        return;
      }

      _transcriptData      = result;
      _transcriptStudentId = studentId;
      _transcriptSettings  = result.settings || { weeklyHours: 10, activeWeeks: { w1:true, w2:true, w3:true, w4:true } };
      _transcriptEditingRow = null;

      _renderTranscriptTab();

      if (!_courseCatalogue) {
        google.script.run
        .withSuccessHandler(function(catResult) {
          _courseCatalogue = (catResult && catResult.success) ? catResult.courses : [];

            const transcriptView = document.getElementById('modalTranscriptView');
          if (transcriptView && !transcriptView.classList.contains('hidden') && _transcriptData) {
            _renderTranscriptTab();
            }
          })
          .withFailureHandler(function() { _courseCatalogue = []; })
          .getCourseCatalogue();
      }
    })
    .withFailureHandler(function(err) {
      document.getElementById('transcriptLoading').style.display = 'none';
      document.getElementById('transcriptContent').classList.remove('hidden');
      document.getElementById('transcriptContent').innerHTML =
        '<div style="padding:24px;text-align:center;color:var(--high);">Failed to load: ' +
        esc(err && err.message ? err.message : 'unknown error') + '</div>';
    })
    .getStudentTranscript(studentId);
}

function _renderTranscriptTab() {
  const data = _transcriptData;
  if (!data) return;

  const courses = data.courses || [];
  const credits  = TargetDateEngine.calculateCredits(courses, _getCourseIdCategoryMap());
  const totalEarned    = credits.reduce((s, c) => s + c.earned, 0);
  const totalMax       = credits.reduce((s, c) => s + c.max, 0);
  const totalRemaining = Math.max(totalMax - totalEarned, 0);
  const completedCount = courses.filter(c => c.completed).length;
  const inProgress     = courses.filter(c => !c.completed && !c.transfer).length;
  const overdueCount   = courses.filter(c => {
    const status = TargetDateEngine.getStatus(c.targetDate, c.completed, c.transfer);
    return status === 'overdue';
  }).length;

  let html = `
    <div class="tr-chip-row">
      <div class="tr-chip"><div class="tr-chip-label">Credits Earned</div><div class="tr-chip-value">${totalEarned.toFixed(1)}</div></div>
      <div class="tr-chip"><div class="tr-chip-label">Credits Remaining</div><div class="tr-chip-value">${totalRemaining.toFixed(1)}</div></div>
      <div class="tr-chip"><div class="tr-chip-label">Courses Completed</div><div class="tr-chip-value">${completedCount}</div></div>
      <div class="tr-chip"><div class="tr-chip-label">In Progress</div><div class="tr-chip-value">${inProgress}</div></div>
      ${overdueCount > 0 ? `<div class="tr-chip" style="border-color:color-mix(in srgb, var(--high) 35%, transparent);"><div class="tr-chip-label" style="color:var(--high);">Overdue</div><div class="tr-chip-value" style="color:var(--high);">${overdueCount}</div></div>` : ''}
    </div>

    <div style="margin-bottom:18px;">
      <div style="font-size:12px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px;">Credits by Category</div>
      <div style="display:flex;flex-direction:column;gap:6px;">
        ${credits.map(c => {
          const pctFill = c.max > 0 ? Math.min((c.earned / c.max) * 100, 100) : 0;
          const barColor = pctFill >= 100 ? 'var(--low)' : pctFill >= 50 ? 'var(--medium)' : 'var(--accent-dim)';
          return `<div style="display:flex;align-items:center;gap:10px;">
            <span style="width:110px;font-size:12px;color:var(--text-soft);flex-shrink:0;">${esc(c.category)}</span>
            <div style="flex:1;height:8px;background:var(--bg4);border-radius:4px;overflow:hidden;">
              <div style="height:100%;width:${pctFill}%;background:${barColor};border-radius:4px;"></div>
            </div>
            <span style="width:70px;text-align:right;font-size:12px;font-weight:600;color:var(--text-muted);flex-shrink:0;">${c.earned.toFixed(1)} / ${c.max}</span>
          </div>`;
        }).join('')}
      </div>
    </div>

    <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px;">
      <button class="btn-override" onclick="_openTranscriptSettings()" style="font-size:12px;padding:6px 12px;">
        ⚙ Pacing Settings (${_transcriptSettings.weeklyHours}h/wk)
      </button>
      <span style="font-size:11px;color:var(--text-muted);font-style:italic;">
        Target dates recalculate live as you edit hours or start dates below.
      </span>
    </div>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px;">
      <button class="btn-override" onclick="_openTranscriptSettings()" style="font-size:12px;padding:6px 12px;">
        ⚙ Pacing Settings (${_transcriptSettings.weeklyHours}h/wk)
      </button>
      <button class="btn-override" onclick="_autoPopulateTranscript()" style="font-size:12px;padding:6px 12px;">
        Auto-Populate Transcript
      </button>
      <span style="font-size:11px;color:var(--text-muted);font-style:italic;">
        Target dates recalculate live as you edit hours or start dates below.
      </span>
    </div>
  `;

  html += _renderTranscriptBlock(1, 'Year 1', courses.filter(c => c.block === 1));
  html += _renderTranscriptBlock(2, 'Year 2', courses.filter(c => c.block === 2));

  document.getElementById('transcriptContent').innerHTML = html;
}

function _renderTranscriptBlock(blockNum, label, courses) {
  const uid = 'tr-block-' + blockNum;

  let rows = courses.map(c => _renderTranscriptRow(c)).join('');
  if (!courses.length) {
    rows = `<tr><td colspan="8" style="padding:16px;text-align:center;color:var(--text-muted);font-style:italic;">No courses in ${esc(label)} yet.</td></tr>`;
  }

  return `
    <div class="tr-block-header">${label}</div>
    <table class="tr-table" id="${uid}">
      <thead>
        <tr>
          <th>Course</th>
          <th>Subject</th>
          <th>Credit</th>
          <th>Hours</th>
          <th>Start</th>
          <th>Target Date</th>
          <th>Status</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="${uid}-body">
        ${rows}
        <tr class="tr-row-add" onclick="_openTranscriptAddRow(${blockNum})">
          <td colspan="8" style="padding:10px;">+ Add Course to ${esc(label)}</td>
        </tr>
      </tbody>
    </table>
  `;
}

function _renderTranscriptRow(c) {
  const status    = TargetDateEngine.getStatus(c.targetDate, c.completed, c.transfer);
  const statusMap = {
    'overdue':   { cls: 'tr-status-overdue',  label: 'Overdue' },
    'on-track':  { cls: 'tr-status-ontrack',  label: 'On Track' },
    'completed': { cls: 'tr-status-complete', label: 'Completed' },
    'transfer':  { cls: 'tr-status-transfer', label: 'Transfer' },
    'no-date':   { cls: 'tr-status-nodate',   label: 'No Date' },
  };
  const s = statusMap[status] || statusMap['no-date'];
  const rowKey = 'row-' + c.rowId;
  const isEditing = _transcriptEditingRow === c.rowId;

  const mainRow = `
    <tr class="tr-row ${isEditing ? 'editing' : ''}" onclick="_toggleTranscriptEdit('${esc(String(c.rowId))}')" id="${rowKey}">
      <td>${esc(c.courseName || '—')}</td>
      <td>${esc(c.subject || '—')}</td>
      <td>${c.credit || 0}</td>
      <td>${c.classHours || 0}</td>
      <td>${esc(c.adjStart || c.startDate || '—')}</td>
      <td>${c.completed ? '—' : (c.targetDate ? TargetDateEngine.formatDisplay(c.targetDate) : '—')}</td>
      <td><span class="tr-status-pill ${s.cls}">${s.label}</span></td>
      <td style="text-align:right;color:var(--text-muted);font-size:11px;">${isEditing ? '▾' : '▸'} Edit</td>
    </tr>`;

  const editPanelId = 'edit-' + c.rowId;
  const editPanel = `
    <tr id="${editPanelId}-row" class="${isEditing ? '' : 'hidden'}">
      <td colspan="8" style="padding:0;border-bottom:1px solid var(--border);">
        <div id="${editPanelId}" class="tr-edit-panel" style="margin:10px 14px;"></div>
      </td>
    </tr>`;

  return mainRow + editPanel;
}

function _toggleTranscriptEdit(rowId) {
  const wasEditing = String(_transcriptEditingRow) === String(rowId);
  _transcriptEditingRow = wasEditing ? null : rowId;
  _renderTranscriptTab();
  if (!wasEditing) {
    const course = (_transcriptData.courses || []).find(c => String(c.rowId) === String(rowId));
    if (course) _renderTranscriptEditForm('edit-' + rowId, course, false);
  }
}

function _openTranscriptAddRow(blockNum) {
  const tempKey = 'new-' + blockNum;
  _transcriptEditingRow = null;

  const bodyId = 'tr-block-' + blockNum + '-body';
  const body   = document.getElementById(bodyId);
  if (!body) return;

  // Remove any previous "new row" form if one is already open
  const existing = document.getElementById('tr-new-row-wrap');
  if (existing) existing.remove();

  const wrap = document.createElement('tr');
  wrap.id = 'tr-new-row-wrap';
  wrap.innerHTML = `<td colspan="8" style="padding:0;">
    <div id="tr-new-panel" class="tr-edit-panel" style="margin:10px 14px;"></div>
  </td>`;
  // Insert right before the "+ Add Course" row (which is always last)
  const addRow = body.querySelector('.tr-row-add');
  body.insertBefore(wrap, addRow);

  const blankCourse = {
    rowId: null, block: blockNum, classNumber: '', courseId: '', courseName: '',
    instance: '', transfer: false, subject: '', credit: 0, classHours: 0,
    startDate: null, adjStart: null, targetDate: null, completed: false,
  };
  _renderTranscriptEditForm('tr-new-panel', blankCourse, true);
}

function _renderTranscriptEditForm(panelId, course, isNew) {
  const panel = document.getElementById(panelId);
  if (!panel) return;

  const catalogueOptions = (_courseCatalogue || [])
    .map(c => `<option value="${esc(c.className)}" data-subject="${esc(c.category)}" ${c.className === course.courseName ? 'selected' : ''}>${esc(c.className)}</option>`)
    .join('');

  panel.innerHTML = `
    <div class="tr-edit-grid">
      <div class="tr-edit-field" style="grid-column:span 2;">
        <label>Course Name</label>
        ${catalogueOptions
          ? `<select id="${panelId}-courseName" onchange="_onTranscriptCourseSelect('${panelId}')">
               <option value="">— Select or type below —</option>
               ${catalogueOptions}
             </select>`
          : ''}
        <input type="text" id="${panelId}-courseNameFree" value="${esc(course.courseName || '')}" placeholder="Course name" style="margin-top:${_courseCatalogue && _courseCatalogue.length ? '6px' : '0'};">
      </div>
      <div class="tr-edit-field">
        <label>Category</label>
        <select id="${panelId}-subject">
          <option value="">— Select category —</option>
          ${TRANSCRIPT_COURSE_CATEGORIES.map(cat =>
            `<option value="${esc(cat)}" ${course.subject === cat ? 'selected' : ''}>${esc(cat)}</option>`
          ).join('')}
        </select>
      </div>

      <div class="tr-edit-field">
        <label>Credit</label>
        <input type="number" step="0.1" id="${panelId}-credit" value="${course.credit || 0}">
      </div>
      <div class="tr-edit-field">
        <label>Class Hours</label>
        <input type="number" step="1" id="${panelId}-classHours" value="${course.classHours || 0}" oninput="_recalcTranscriptPreview('${panelId}')">
      </div>
      <div class="tr-edit-field">
        <label>Instance</label>
        <input type="text" id="${panelId}-instance" value="${esc(course.instance || '')}" placeholder="1">
      </div>

      <div class="tr-edit-field">
        <label>Start Date</label>
        <input type="date" id="${panelId}-startDate" value="${course.startDate || ''}" oninput="_recalcTranscriptPreview('${panelId}')">
      </div>
      <div class="tr-edit-field">
        <label>Adjusted Start</label>
        <input type="date" id="${panelId}-adjStart" value="${course.adjStart || ''}" oninput="_recalcTranscriptPreview('${panelId}')">
      </div>
      <div class="tr-edit-field checkbox-field">
        <input type="checkbox" id="${panelId}-completed" ${course.completed ? 'checked' : ''} onchange="_recalcTranscriptPreview('${panelId}')">
        <label for="${panelId}-completed">Completed</label>
      </div>

      <div class="tr-edit-field checkbox-field">
        <input type="checkbox" id="${panelId}-transfer" ${course.transfer ? 'checked' : ''} onchange="_recalcTranscriptPreview('${panelId}')">
        <label for="${panelId}-transfer">Transfer Credit</label>
      </div>
    </div>

    <div class="tr-target-preview" id="${panelId}-preview"></div>

    <div class="tr-edit-actions">
      <button class="btn-override tr-save-btn" data-panel-id="${panelId}" data-row-id="${course.rowId ?? ''}" data-block="${course.block ?? ''}" data-is-new="${isNew ? '1' : '0'}">
        ${isNew ? 'Add Course' : 'Save Changes'}
      </button>
      <button class="btn-override danger tr-cancel-btn" data-panel-id="${panelId}" data-row-id="${course.rowId ?? ''}" data-is-new="${isNew ? '1' : '0'}">
        Cancel
      </button>
      <span id="${panelId}-status" style="font-size:12px;color:var(--text-muted);align-self:center;"></span>
    </div>
  `;

  panel.querySelector('.tr-save-btn').addEventListener('click', function() {
    const rowId = this.dataset.rowId || null;
    const block = this.dataset.block ? Number(this.dataset.block) : null;
    const isNewRow = this.dataset.isNew === '1';
    _saveTranscriptRow(this.dataset.panelId, rowId, block, isNewRow);
  });

  panel.querySelector('.tr-cancel-btn').addEventListener('click', function() {
    if (this.dataset.isNew === '1') {
      _cancelTranscriptAdd();
    } else {
      _toggleTranscriptEdit(this.dataset.rowId);
    }
  });
  if (!_canEdit('transcript')) {
    panel.querySelectorAll('input, select, button.tr-save-btn').forEach(el => el.disabled = true);
    const status = panel.querySelector(`#${panelId}-status`);
    if (status) { status.textContent = 'View only — you do not have permission to edit transcripts.'; status.style.color = 'var(--text-muted)'; }
  }
  _recalcTranscriptPreview(panelId);
}

function _onTranscriptCourseSelect(panelId) {
  const sel = document.getElementById(panelId + '-courseName');
  if (!sel || !sel.value) return;
  document.getElementById(panelId + '-courseNameFree').value = sel.value;
  const subjectEl = document.getElementById(panelId + '-subject');
  const opt = sel.options[sel.selectedIndex];
  const subject = opt ? opt.getAttribute('data-subject') : '';
  if (subjectEl && subject) subjectEl.value = subject;
  _recalcTranscriptPreview(panelId);
}

function _recalcTranscriptPreview(panelId) {
  const hoursEl     = document.getElementById(panelId + '-classHours');
  const startEl     = document.getElementById(panelId + '-startDate');
  const adjStartEl  = document.getElementById(panelId + '-adjStart');
  const completedEl = document.getElementById(panelId + '-completed');
  const transferEl  = document.getElementById(panelId + '-transfer');
  const previewEl   = document.getElementById(panelId + '-preview');
  if (!previewEl) return;

  const hours     = parseFloat(hoursEl ? hoursEl.value : 0) || 0;
  const startDate = (adjStartEl && adjStartEl.value) ? adjStartEl.value : (startEl ? startEl.value : '');
  const completed = completedEl ? completedEl.checked : false;
  const transfer  = transferEl  ? transferEl.checked  : false;

  if (completed) {
    previewEl.innerHTML = `<span style="color:var(--low);font-weight:700;">✓ Marked Completed</span> — no target date needed.`;
    return;
  }
  if (transfer) {
    previewEl.innerHTML = `<span style="color:var(--text-muted);font-weight:700;">Transfer Credit</span> — no target date calculated.`;
    return;
  }

  const target = TargetDateEngine.calculate(hours, startDate, _transcriptSettings, completed, transfer);
  if (!target) {
    previewEl.innerHTML = `<span style="color:var(--text-muted);">Enter class hours and a start date to see the projected target date.</span>`;
    return;
  }
  const status = TargetDateEngine.getStatus(target, false, false);
  const color  = status === 'overdue' ? 'var(--high)' : 'var(--low)';
  previewEl.innerHTML = `<span style="color:var(--text-muted);">Projected Target Date:</span> <strong style="color:${color};">${TargetDateEngine.formatDisplay(target)}</strong>
    <span style="color:var(--text-muted);font-size:11px;">(based on ${_transcriptSettings.weeklyHours}h/wk pacing settings)</span>`;
}

function _saveTranscriptRow(panelId, rowId, block, isNew) {
  const studentId = _transcriptStudentId;
  const statusEl  = document.getElementById(panelId + '-status');

  const subjectVal = document.getElementById(panelId + '-subject').value;
  if (!subjectVal) {
    if (statusEl) { statusEl.textContent = 'Please select a category.'; statusEl.style.color = 'var(--high)'; }
    return;
  }
  const courseName = (document.getElementById(panelId + '-courseNameFree') || {}).value || '';
  if (!courseName.trim()) {
    if (statusEl) { statusEl.textContent = 'Course name is required.'; statusEl.style.color = 'var(--high)'; }
    return;
  }

  const hours     = parseFloat(document.getElementById(panelId + '-classHours').value) || 0;
  const startDate = document.getElementById(panelId + '-startDate').value || null;
  const adjStart  = document.getElementById(panelId + '-adjStart').value  || null;
  const completed = document.getElementById(panelId + '-completed').checked;
  const transfer  = document.getElementById(panelId + '-transfer').checked;
  const effectiveStart = adjStart || startDate;
  const targetDate = (completed || transfer) ? null : TargetDateEngine.calculate(hours, effectiveStart, _transcriptSettings, completed, transfer);

  const rowData = {
    rowId: rowId || null,
    block,
    courseId:   '',
    courseName: courseName.trim(),
    instance:   document.getElementById(panelId + '-instance').value || '',
    transfer,
    subject:    document.getElementById(panelId + '-subject').value || '',
    credit:     parseFloat(document.getElementById(panelId + '-credit').value) || 0,
    classHours: hours,
    startDate,
    adjStart,
    targetDate,
    completed,
  };

  if (statusEl) { statusEl.textContent = 'Saving…'; statusEl.style.color = 'var(--text-muted)'; }

  const serverCall = isNew
    ? () => google.script.run
        .withSuccessHandler(onSaved)
        .withFailureHandler(onFailed)
        .addTranscriptRow(studentId, rowData)
    : () => google.script.run
        .withSuccessHandler(onSaved)
        .withFailureHandler(onFailed)
        .saveTranscriptRow(studentId, rowData);

  function onSaved(result) {
    if (!result || result.success === false) { onFailed(result); return; }
    showToast(isNew ? 'Course added.' : 'Course updated.');
    _transcriptData = null;
    _transcriptEditingRow = null;
    _loadTranscriptTab();
  }
  function onFailed(err) {
    const msg = (err && err.error) || (err && err.message) || 'Save failed — please try again.';
    if (statusEl) { statusEl.textContent = msg; statusEl.style.color = 'var(--high)'; }
  }

  serverCall();
}

function _saveTranscriptSettings() {

  const activeWeeks = {
    w1: document.getElementById('trsw1').checked,
    w2: document.getElementById('trsw2').checked,

    .withSuccessHandler(function(result) {

// Most recent Monday, formatted as yyyy-MM-dd for the date input.
function _defaultTimeLogWeek_() {
  const today = new Date();
  const day = today.getDay(); // 0=Sun..6=Sat
  const diffToMonday = (day === 0 ? 6 : day - 1);
  const monday = new Date(today);
  monday.setDate(today.getDate() - diffToMonday);
  const y = monday.getFullYear();
  const m = String(monday.getMonth() + 1).padStart(2, '0');
  const d = String(monday.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}

function _submitWeeklyTimeLog() {
  if (!_canEdit('timelog')) {
    showToast('You do not have permission to edit time logs.', 'error');
    return;
  }
  const studentId = currentModalProfile ? (currentModalProfile.academicId || currentModalProfile.id) : null;
  const week   = document.getElementById('timeLogWeekInput').value;
  const log    = document.getElementById('timeLogPasteInput').value;
  const status = document.getElementById('timeLogStatus');
  const btn    = document.getElementById('timeLogSaveBtn');

  if (!studentId) { status.textContent = 'No student ID on file.';    status.style.color = 'var(--high)'; return; }
  if (!week)      { status.textContent = 'Pick a week first.';        status.style.color = 'var(--high)'; return; }
  if (!log.trim()) { status.textContent = 'Paste a session log first.'; status.style.color = 'var(--high)'; return; }

  btn.disabled = true;
  btn.textContent = 'Saving…';
  status.textContent = 'Parsing log…';
  status.style.color = 'var(--text-muted)';

  google.script.run
    .withSuccessHandler(function(result) {
      btn.disabled = false;
      btn.textContent = 'Save This Week';
      if (!result || result.success === false) {
        status.textContent = (result && result.error) || 'Save failed.';
        status.style.color = 'var(--high)';
        return;
      }
      status.textContent = '✓ Week of ' + result.weekLabel + ': ' +
        result.actualWorkedTime.toFixed(2) + 'h worked (of ' + result.assignedHours.toFixed(1) + 'h assigned), ' +
        result.idleTime.toFixed(2) + 'h idle.';
      status.style.color = 'var(--low)';
      document.getElementById('timeLogPasteInput').value = '';
      _refreshTimeLogHistory(studentId);
    })
    .withFailureHandler(function(err) {
      btn.disabled = false;
      btn.textContent = 'Save This Week';
      status.textContent = err && err.message ? err.message : 'Save failed — please try again.';
      status.style.color = 'var(--high)';
    })
    .saveWeeklyTimeLog(studentId, week, log, _currentRole, _currentEmployeeId);
}

// ── Friday helpers (Academic Snapshots are Friday-keyed) ────
function _fridayOf(date) {
  const d = new Date(date);
  const day = d.getDay(); // 0=Sun..6=Sat
  const diffToFriday = (day >= 5) ? (day - 5) : (day + 2);
  d.setDate(d.getDate() - diffToFriday);
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${dd}`;
}

function loadCreditReportPreset(preset) {
  const today = new Date();
  let target = new Date(today);
  if (preset === 'lastWeek')     target.setDate(today.getDate() - 7);
  if (preset === 'twoWeeksAgo')  target.setDate(today.getDate() - 14);
  // 'thisWeek' uses today as-is

  const fridayLabel = _fridayOf(target);
  _fetchCreditReport(fridayLabel);
}

function loadCreditReportCustomDate() {
  const input = document.getElementById('creditReportDateInput');
  if (!input.value) { showToast('Pick a date first.', 'error'); return; }
  const fridayLabel = _fridayOf(input.value);
  _fetchCreditReport(fridayLabel);
}

            <tr style="background:var(--bg4);border-bottom:2px solid var(--border);">

              <th style="padding:6px 10px;text-align:center;color:var(--text-muted);font-size:10px;font-weight:700;text-transform:uppercase;">Credits Earned This Week</th>
              <th style="padding:6px 10px;text-align:center;color:var(--text-muted);font-size:10px;font-weight:700;text-transform:uppercase;">Credits Remaining</th>
              <th style="padding:6px 10px;text-align:center;color:var(--text-muted);font-size:10px;font-weight:700;text-transform:uppercase;">Hours Worked</th>
              <th style="padding:6px 10px;text-align:center;color:var(--text-muted);font-size:10px;font-weight:700;text-transform:uppercase;">Hours Assigned</th>
            </tr>
          </thead>
          <tbody>
            ${g.students.map(st => {
              const gainColor = st.creditsGained > 0 ? 'var(--low)' : st.creditsGained < 0 ? 'var(--high)' : 'var(--text-muted)';
              const gainStr = st.creditsGained == null ? '—'
                : st.creditsGained > 0 ? `Earned +${st.creditsGained} credit${st.creditsGained === 1 ? '' : 's'}`
                : st.creditsGained < 0 ? `Lost ${Math.abs(st.creditsGained)} credit${Math.abs(st.creditsGained) === 1 ? '' : 's'}`
                : 'No change';
              return `<tr style="border-bottom:1px solid var(--border);">
                <td style="padding:6px 10px;font-weight:600;color:var(--text);">${esc(st.name)}</td>
                <td style="padding:6px 10px;text-align:center;font-weight:700;color:${gainColor};">${gainStr}</td>
                <td style="padding:6px 10px;text-align:center;">${st.creditsRemaining ?? '—'}</td>
                <td style="padding:6px 10px;text-align:center;">${st.hoursWorked != null ? st.hoursWorked.toFixed(1) + 'h' : '—'}</td>
                <td style="padding:6px 10px;text-align:center;color:var(--text-muted);">${st.hoursAssigned != null ? st.hoursAssigned.toFixed(1) + 'h' : '—'}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>`;
  });

  body.innerHTML = html;
}

function copyCreditReport() {
  if (!_creditReportData || !_creditReportData.success) { showToast('No report loaded yet.', 'error'); return; }

  let text = `Weekly Credit Report — Week of ${_creditReportData.weekLabel}`;
  if (_creditReportData.isSnapshot) text += ` (Snapshot: ${_creditReportData.snapshotName})`;
  text += '\n\n';
  _creditReportData.groups.forEach(g => {
    text += `${g.hsdClass}\n`;
    text += `Student\tCredits Earned This Week\tCredits Remaining\tHours Worked\tHours Assigned\n`;
    g.students.forEach(st => {
      const gainStr = st.creditsGained == null ? '—'
        : st.creditsGained > 0 ? `Earned +${st.creditsGained} credit${st.creditsGained === 1 ? '' : 's'}`
        : st.creditsGained < 0 ? `Lost ${Math.abs(st.creditsGained)} credit${Math.abs(st.creditsGained) === 1 ? '' : 's'}`
        : 'No change';
      text += `${st.name}\t${gainStr}\t${st.creditsRemaining ?? '—'}\t${st.hoursWorked != null ? st.hoursWorked.toFixed(1) : '—'}\t${st.hoursAssigned != null ? st.hoursAssigned.toFixed(1) : '—'}\n`;
    });
    text += '\n';
  });

  navigator.clipboard.writeText(text).then(() => {
    showToast('Report copied — paste into email or a doc.');
  }).catch(() => {
    showToast('Copy failed — clipboard access may be blocked.', 'error');
  });
}

// ─────────────────────────────────────────────────────────────
// 35. Bulk pacing tool
// ─────────────────────────────────────────────────────────────
let _bulkPacingData     = null;  // full scan result from server
let _bulkPacingSelected = new Set(); // studentIds currently checked
let _bulkPacingOverrides = {};   // studentId -> { weeklyHours, activeWeeks } — manual edits to the suggestion

function openBulkPacingModal() {
  document.getElementById('bulkPacingModal').classList.remove('hidden');
  if (!_bulkPacingData) {
    _loadBulkPacingScan();
  } else {
    document.getElementById('bulkPacingLoading').style.display = 'none';
    document.getElementById('bulkPacingContent').classList.remove('hidden');
    _renderBulkPacingTable();
  }
}

function closeBulkPacingModal() {
  document.getElementById('bulkPacingModal').classList.add('hidden');
}

function _loadBulkPacingScan() {
  document.getElementById('bulkPacingLoading').style.display = 'block';
  document.getElementById('bulkPacingContent').classList.add('hidden');

  google.script.run
    .withSuccessHandler(function(result) {
      document.getElementById('bulkPacingLoading').style.display = 'none';
      document.getElementById('bulkPacingContent').classList.remove('hidden');

      if (!result || result.success === false) {
        document.getElementById('bulkPacingContent').innerHTML =
          '<div style="padding:24px;text-align:center;color:var(--high);">' +
          esc(result && result.error ? result.error : 'Scan failed.') + '</div>';
        return;
      }

      _bulkPacingData      = result;
      _bulkPacingSelected  = new Set();
      _bulkPacingOverrides = {};
      _renderBulkPacingTable();
    })
    .withFailureHandler(function(err) {
      document.getElementById('bulkPacingLoading').style.display = 'none';
      document.getElementById('bulkPacingContent').classList.remove('hidden');
      document.getElementById('bulkPacingContent').innerHTML =
        '<div style="padding:24px;text-align:center;color:var(--high);">Failed to scan: ' +
        esc(err && err.message ? err.message : 'unknown error') + '</div>';
    })
    .scanAllStudentPacing();
}

function _getFilteredPacingStudents() {
  if (!_bulkPacingData) return [];
  const search = (document.getElementById('bulkPacingSearch').value || '').toLowerCase().trim();
  const status = document.getElementById('bulkPacingStatusFilter').value;

  return _bulkPacingData.students.filter(s => {
    if (status !== 'ALL' && s.status !== status) return false;
    if (search && !s.displayName.toLowerCase().includes(search)) return false;
    return true;
  });
}

function _renderBulkPacingTable() {
  const filtered = _getFilteredPacingStudents();
  const body = document.getElementById('bulkPacingBody');

  const statusLabels = {
    new: 'New', changed: 'Changed', unchanged: 'Unchanged', no_schedule: 'No Schedule',
  };

  body.innerHTML = filtered.map(s => {
    const override = _bulkPacingOverrides[s.studentId];
    const hours = override ? override.weeklyHours : s.detectedHours;
    const weeks = override ? override.activeWeeks  : s.detectedActiveWeeks;
    const isChecked = _bulkPacingSelected.has(s.studentId);
    const rowUid = 'bp-' + s.studentId.replace(/\W/g, '');

    const weekDots = ['w1','w2','w3','w4'].map((w, i) =>
      `<span class="pacing-week-dot ${weeks[w] ? 'active' : ''}">${i+1}</span>`
    ).join('');

    const savedText = s.hasExisting
      ? `${s.existingHours}h/wk (${['w1','w2','w3','w4'].filter(w => s.existingActiveWeeks[w]).map((w,i)=>i+1).join(',') || 'none'})`
      : '—';

    return `<tr>
      <td><input type="checkbox" class="bp-row-check" data-id="${esc(s.studentId)}" ${isChecked ? 'checked' : ''} onchange="_toggleBulkPacingRow('${esc(s.studentId)}', this.checked)"></td>
      <td style="font-weight:600;color:var(--text);">${esc(s.displayName)}</td>
      <td><span class="pacing-status-pill pacing-status-${s.status}">${statusLabels[s.status] || s.status}</span></td>
      <td>
        <input type="number" value="${hours}" min="0" step="1" style="width:56px;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:var(--font);font-size:12px;padding:3px 6px;"
          onchange="_setPacingOverride('${esc(s.studentId)}', 'hours', this.value)" ${!s.hasSchedule ? 'disabled' : ''}>
      </td>
      <td>
        <span class="pacing-week-mini" id="${rowUid}-weeks">${weekDots}</span>
        <button onclick="_cyclePacingWeekPreset('${esc(s.studentId)}')" style="background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:11px;margin-left:4px;" title="Cycle: Weeks 1&3 / Weeks 2&4 / All / None">⟳</button>
      </td>
      <td style="color:var(--text-muted);font-size:11.5px;">${savedText}</td>
      <td>${!s.hasSchedule ? `<span style="color:var(--text-muted);font-size:11px;font-style:italic;">no schedule</span>` : ''}</td>
    </tr>`;
  }).join('');

  // Summary chip
  const total    = _bulkPacingData ? _bulkPacingData.students.length : 0;
  const shown    = filtered.length;
  const selected = _bulkPacingSelected.size;
  document.getElementById('bulkPacingSummary').innerHTML =
    `<strong>${shown}</strong> of ${total} shown · <strong>${selected}</strong> selected`;
}

function _toggleBulkPacingRow(studentId, checked) {
  if (checked) _bulkPacingSelected.add(studentId);
  else         _bulkPacingSelected.delete(studentId);
  _renderBulkPacingTable();
}

function _toggleAllPacingRows(checked) {
  const filtered = _getFilteredPacingStudents();
  filtered.forEach(s => {
    if (!s.hasSchedule) return; // don't auto-select students with nothing to apply
    if (checked) _bulkPacingSelected.add(s.studentId);
    else         _bulkPacingSelected.delete(s.studentId);
  });
  _renderBulkPacingTable();
}

function _setPacingOverride(studentId, field, value) {
  const student = _bulkPacingData.students.find(s => s.studentId === studentId);
  if (!student) return;

  const current = _bulkPacingOverrides[studentId] || {
    weeklyHours: student.detectedHours,
    activeWeeks: Object.assign({}, student.detectedActiveWeeks),
  };

  if (field === 'hours') {
    current.weeklyHours = parseFloat(value) || 0;
  }
  _bulkPacingOverrides[studentId] = current;
}

// Cycles a row's active-weeks pattern through the common presets,
// so staff don't have to hand-edit checkboxes for the odd student
// whose rotation doesn't match the biweekly guess.
const PACING_WEEK_PRESETS = [
  { w1: true,  w2: false, w3: true,  w4: false }, // weeks 1 & 3
  { w1: false, w2: true,  w3: false, w4: true  }, // weeks 2 & 4
  { w1: true,  w2: true,  w3: true,  w4: true  }, // all weeks (full time academics)
  { w1: false, w2: false, w3: false, w4: false }, // none (full time trades)
];

function _cyclePacingWeekPreset(studentId) {
  const student = _bulkPacingData.students.find(s => s.studentId === studentId);
  if (!student) return;

  const current = _bulkPacingOverrides[studentId] || {
    weeklyHours: student.detectedHours,
    activeWeeks: Object.assign({}, student.detectedActiveWeeks),
  };

  const currentIndex = PACING_WEEK_PRESETS.findIndex(p =>
    p.w1 === current.activeWeeks.w1 && p.w2 === current.activeWeeks.w2 &&
    p.w3 === current.activeWeeks.w3 && p.w4 === current.activeWeeks.w4
  );
  const nextPreset = PACING_WEEK_PRESETS[(currentIndex + 1) % PACING_WEEK_PRESETS.length];

  current.activeWeeks = Object.assign({}, nextPreset);
  _bulkPacingOverrides[studentId] = current;
  _renderBulkPacingTable();
}

function _applyBulkPacing() {
  const ids = [..._bulkPacingSelected];
  if (!ids.length) {
    showToast('Select at least one student first.', 'error');
    return;
  }

  const updates = ids.map(studentId => {
    const student  = _bulkPacingData.students.find(s => s.studentId === studentId);
    const override = _bulkPacingOverrides[studentId];
    return {
      studentId,
      weeklyHours: override ? override.weeklyHours : student.detectedHours,
      activeWeeks: override ? override.activeWeeks  : student.detectedActiveWeeks,
    };
  });

  const btn    = document.getElementById('bulkPacingApplyBtn');
  const status = document.getElementById('bulkPacingApplyStatus');
  btn.disabled = true;
  status.textContent = `Applying to ${updates.length} students…`;
  status.style.color = 'var(--text-muted)';

  google.script.run
    .withSuccessHandler(function(result) {
      btn.disabled = false;
      if (!result || result.success === false) {
        status.textContent = (result && result.error) || 'Apply failed.';
        status.style.color = 'var(--high)';
        return;
      }
      status.textContent = `✓ Applied to ${result.applied} students` +
        (result.skippedCount ? ` — ${result.skippedCount} skipped (not found).` : '.');
      status.style.color = 'var(--low)';
      showToast(`Pacing settings applied to ${result.applied} students.`);

      // Force a fresh scan next time the modal opens, so "Currently
      // Saved" reflects what was just written.
      _bulkPacingData = null;
      _bulkPacingSelected = new Set();
      _bulkPacingOverrides = {};
    })
    .withFailureHandler(function(err) {
      btn.disabled = false;
      status.textContent = (err && err.message) || 'Apply failed — please try again.';
      status.style.color = 'var(--high)';
    })
    .batchApplyStudentPacing(updates);
}

function runClearAllCaches() {
  showToast('Clearing caches…');
  google.script.run
    .withSuccessHandler(result => {
      if (!result || result.success === false) {
        showToast('Failed to clear caches.', 'error');
        return;
      }
      const cleared = (result.results || []).filter(r => r.cleared);
      const summary = cleared.length
        ? cleared.map(r => r.count ? `${r.label} (${r.count})` : r.label).join(', ')
        : 'Nothing was cached — already clean.';
      showToast('✓ Cleared: ' + summary, null, 6000);
      refreshData(); // re-fetches + re-renders in place — no page reload needed
    })
    .withFailureHandler(err => showToast(err?.message || 'Failed to clear caches.', 'error'))
    .clearAllCaches();
}
</script>
